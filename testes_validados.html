<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>LUK2 — Lab</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Space Mono',monospace;}
  canvas{display:block;width:100%;height:100%;position:absolute;top:0;left:0;}
  #ui{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;
      align-items:center;justify-content:center;background:#000;transition:opacity .4s;}
  #ui.hidden{opacity:0;pointer-events:none;}
  #ui h2{color:rgba(255,255,255,.4);font-size:12px;letter-spacing:3px;margin-bottom:32px;}
  .btn{padding:12px 36px;border:1px solid rgba(255,255,255,.2);border-radius:4px;
    background:transparent;color:#fff;font-family:'Space Mono',monospace;
    font-size:12px;letter-spacing:2px;cursor:pointer;margin:6px;}
  .btn:hover{background:rgba(255,255,255,.06);}
  .drop{margin-top:16px;padding:10px 24px;border:1px dashed rgba(255,255,255,.12);
    border-radius:4px;color:rgba(255,255,255,.3);font-size:11px;letter-spacing:1px;
    cursor:pointer;text-align:center;}
  #fi{display:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <h2>LUK2 — LAB</h2>
  <button class="btn" id="startBtn">▶ DEMO.MP3</button>
  <div class="drop" id="drop">
    arraste seu áudio aqui
    <input type="file" id="fi" accept="audio/*">
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────
//  CANVAS
// ─────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
function resize(){ canvas.width = innerWidth; canvas.height = innerHeight; }
resize(); window.addEventListener('resize', resize);

// ─────────────────────────────────────────────────────────
//  CONFIGURAÇÃO DOS ANÉIS
// ─────────────────────────────────────────────────────────
const N_RINGS = 6;

// Raios base como fração de S (menor lado)
const RING_RADII = [0.07, 0.13, 0.20, 0.28, 0.37, 0.47];

// Cores alternando ciano e magenta
const RING_COLORS = [
  '0,255,255',    // ciano
  '255,0,255',    // magenta
  '0,255,255',
  '255,0,255',
  '0,255,255',
  '255,0,255',
];

// Delay em frames para o ripple (3 frames entre cada anel)
const RING_DELAY = [0, 3, 6, 9, 12, 15];

// Magnitude do impulso crescente para fora
const RING_MAG = [1.2, 1.6, 2.0, 2.5, 3.2, 4.0];

// ─────────────────────────────────────────────────────────
//  MOTION STATE
// ─────────────────────────────────────────────────────────
const ringVel = new Float32Array(N_RINGS);
const ringPos = new Float32Array(N_RINGS);

// Trail por anel
const trailR = new Float32Array(N_RINGS);  // raio atual do trail (fração de S)
const trailA = new Float32Array(N_RINGS);  // opacidade do trail

// Fila de kicks pendentes por anel
const pendingKicks = Array.from({length: N_RINGS}, () => []);

// Breath — bass (anel 1 em diante)
let breathPos = 0;
let breathVel = 0;

// Wave — mid (anel 0: guitarra/voz/piano)
let wavePhase = 0;
let waveAmp   = 0;

let _spawnSmokeOnKick = false;

// ─── Estado visual de campo radial ───────────────────────
let energy   = 0;
let rot1     = 0;
let rot2     = 0;
let hueShift = 0;
const scans  = [];
let scanCool = 0;

// ── Física validada — calculada sempre, renderizada quando reativada ──
let pulseVel   = 0;   // PULSO validado
let pulsePos   = 0;
let warpAmount = 0;   // WARP validado
let flowVel    = 0;   // FLOW validado
let flowAngle  = 0;

// Flash (calculado, não desenhado ainda)
let flashAlpha   = 0;
let glowStrength = 0;
let trailRadius  = 0;
let trailAlpha   = 0;

// Memória dos pulsos — fantasmas em ciano
const GHOST_ALPHAS = [0.70, 0.40, 0.15];
const ghostData = [];  // { pos, alpha }

// ─── Partículas de fumaça neon ───────────────────────────
const smoke = [];   // { x, y, vx, vy, size, alpha, decay, hue }

function spawnSmoke(cx, cy, S){
  const breathScale = 1.0 + breathPos * 0.10;
  const baseR = S * RING_RADII[1] * breathScale;
  const N = 28;

  for(let i = 0; i < N; i++){
    const angle  = (i / N) * TWO_PI + (Math.random() - 0.5) * 0.4;
    const jitter = (Math.random() - 0.5) * S * 0.018;
    const r      = baseR + jitter;
    const x      = cx + Math.cos(angle) * r;
    const y      = cy + Math.sin(angle) * r;

    // velocidade: para fora com deriva angular aleatória
    const speed = (0.4 + Math.random() * 0.8) * S * 0.0014;
    const drift = (Math.random() - 0.5) * 0.35;

    smoke.push({
      x, y,
      vx:    Math.cos(angle + drift) * speed,
      vy:    Math.sin(angle + drift) * speed,
      size:  2 + Math.random() * 4,
      alpha: 0.18 + Math.random() * 0.15,
      decay: 0.030 + Math.random() * 0.022,
      cyan:  Math.random() > 0.5,
    });
  }
}

function applyKickImpulse(mag){
  flashAlpha   = 1.0;
  glowStrength = 1.0;
  trailRadius  = RING_RADII[1];
  trailAlpha   = 0.70;
  // Guarda posição atual como novo fantasma
  ghostData.unshift({ pos: ringPos[1], alpha: GHOST_ALPHAS[0] });
  if(ghostData.length > 3) ghostData.pop();
  // Redefine alpha de cada slot pelo índice
  for(let i = 0; i < ghostData.length; i++) ghostData[i].alpha = GHOST_ALPHAS[i];
  pulseVel    += mag * 4.0;
  warpAmount   = 1.0;
  // Cascata começa do anel 1 — anel 0 só respira com mid
  for(let i = 1; i < N_RINGS; i++){
    pendingKicks[i].push({ framesLeft: RING_DELAY[i], mag: mag * RING_MAG[i] });
  }
  // Fumaça nasce no primeiro anel da cascata (anel 1)
  _spawnSmokeOnKick = true;
  // Scan ring dispara no kick
  scans.push({ r: 0.03, a: 0.90, spd: 0.010 + energy * 0.006 });
}

function stepPhysics(rawBass, rawMid){
  // Processa kicks pendentes por anel
  for(let i = 0; i < N_RINGS; i++){
    for(let j = pendingKicks[i].length - 1; j >= 0; j--){
      pendingKicks[i][j].framesLeft--;
      if(pendingKicks[i][j].framesLeft <= 0){
        ringVel[i] += pendingKicks[i][j].mag * 0.35;
        // Spawn trail no raio atual do anel
        const breathScale = i === 0 ? (1.0 + breathPos * 0.14) : 1.0;
        trailR[i] = RING_RADII[i] * breathScale + ringPos[i] * 0.04;
        trailA[i] = 0.75;
        pendingKicks[i].splice(j, 1);
      }
    }
    ringPos[i] += ringVel[i];
    ringVel[i] *= 0.65;
    ringPos[i] *= 0.80;

    // Trail: expande e some
    if(trailA[i] > 0){
      trailR[i] += 0.009;
      trailA[i] -= 0.052;
      if(trailA[i] < 0) trailA[i] = 0;
    }
  }

  // Breath — bass (anéis 1-5)
  const rawBassClamped = rawBass > 0.08 ? rawBass : 0;
  const breathTarget   = rawBassClamped * 2.0;
  breathVel += (breathTarget - breathPos) * 0.10;
  breathPos += breathVel;
  breathVel *= 0.75;

  // Wave — mid (anel 0: guitarra/voz/piano)
  const rawMidClamped = rawMid > 0.05 ? rawMid : 0;
  wavePhase += rawMidClamped * 4.0 + 0.008;
  waveAmp    = rawMidClamped * 0.06;

  flashAlpha   *= 0.72;
  glowStrength *= 0.80;

  // Física validada — sempre calculada, renderizada quando reativada
  pulsePos  += pulseVel;
  pulseVel  *= 0.65;
  pulsePos  *= 0.80;
  warpAmount *= 0.68;
  flowVel   += rawMidClamped * 0.22;
  flowAngle += flowVel;
  flowVel   *= 0.78;

  // Rastro radial simples
  if(trailAlpha > 0){
    trailRadius += 0.010;
    trailAlpha  -= 0.055;
    if(trailAlpha < 0) trailAlpha = 0;
  }
  // Fantasmas — decaem suavemente entre kicks
  for(const g of ghostData){
    g.alpha -= 0.012;
    if(g.alpha < 0) g.alpha = 0;
  }

  // Campo radial — estado visual
  energy   += ((rawBass + rawMid) * 0.55 - energy) * 0.15;
  rot1     += 0.007 + energy * 0.010;
  rot2     -= 0.004 + energy * 0.007;
  hueShift  = (hueShift + 0.4) % 360;
  for(let i = scans.length - 1; i >= 0; i--){
    scans[i].r += scans[i].spd;
    scans[i].a -= 0.016;
    if(scans[i].a <= 0) scans.splice(i, 1);
  }
}

// ─────────────────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────────────────
const TWO_PI = Math.PI * 2;

function draw(){
  const W  = canvas.width;
  const H  = canvas.height;
  const cx = W / 2;
  const cy = H / 2;
  const S  = Math.min(W, H);
  const e  = energy;

  // Trail cinematográfico
  ctx.fillStyle = 'rgba(0,0,0,0.14)';
  ctx.fillRect(0, 0, W, H);

  // Bloom central
  const bloomR = S * (0.20 + e * 0.22);
  const bloom  = ctx.createRadialGradient(cx, cy, 0, cx, cy, bloomR);
  bloom.addColorStop(0,   `hsla(${hueShift},100%,90%,${(0.25 + e * 0.40).toFixed(2)})`);
  bloom.addColorStop(0.4, `hsla(${(hueShift+40)%360},100%,60%,${(0.08 + e * 0.15).toFixed(2)})`);
  bloom.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = bloom;
  ctx.beginPath(); ctx.arc(cx, cy, bloomR, 0, TWO_PI); ctx.fill();

  // Camada 1: 14 anéis orgânicos (folds=5, rot1)
  const N1 = 14, folds1 = 5;
  for(let i = 0; i < N1; i++){
    const t     = (i + 0.5) / N1;
    const baseR = t * S * 0.52;
    const warpA = baseR * (0.07 + e * 0.13);
    const alpha = (1 - t * 0.6) * (0.45 + e * 0.45);
    const hue   = (hueShift + t * 140) % 360;
    ctx.save();
    ctx.shadowBlur  = 10 + e * 28;
    ctx.shadowColor = `hsl(${hue},100%,60%)`;
    ctx.strokeStyle = `hsla(${hue},100%,65%,${alpha.toFixed(2)})`;
    ctx.lineWidth   = 1.2 + e * 1.5;
    ctx.beginPath();
    for(let k = 0; k <= 180; k++){
      const a = (k / 180) * TWO_PI;
      const r = baseR + warpA * Math.sin(folds1 * a + rot1 + t * Math.PI * 1.3);
      k === 0 ? ctx.moveTo(cx + Math.cos(a)*r, cy + Math.sin(a)*r)
              : ctx.lineTo(cx + Math.cos(a)*r, cy + Math.sin(a)*r);
    }
    ctx.closePath(); ctx.stroke(); ctx.restore();
  }

  // Camada 2: 9 anéis (folds=7, rot2 oposto)
  const N2 = 9, folds2 = 7;
  for(let i = 0; i < N2; i++){
    const t     = (i + 0.3) / N2;
    const baseR = t * S * 0.44 + S * 0.04;
    const warpA = baseR * (0.05 + e * 0.09);
    const alpha = (1 - t * 0.55) * (0.28 + e * 0.32);
    const hue   = (hueShift + 180 + t * 100) % 360;
    ctx.save();
    ctx.shadowBlur  = 8 + e * 20;
    ctx.shadowColor = `hsl(${hue},100%,60%)`;
    ctx.strokeStyle = `hsla(${hue},100%,65%,${alpha.toFixed(2)})`;
    ctx.lineWidth   = 0.9 + e * 1.0;
    ctx.beginPath();
    for(let k = 0; k <= 180; k++){
      const a = (k / 180) * TWO_PI;
      const r = baseR + warpA * Math.sin(folds2 * a + rot2 + t * 2.1);
      k === 0 ? ctx.moveTo(cx + Math.cos(a)*r, cy + Math.sin(a)*r)
              : ctx.lineTo(cx + Math.cos(a)*r, cy + Math.sin(a)*r);
    }
    ctx.closePath(); ctx.stroke(); ctx.restore();
  }

  // Linhas radiais
  const N_LINES = 20;
  ctx.save();
  ctx.shadowBlur  = 12 + e * 25;
  ctx.shadowColor = `hsl(${(hueShift+60)%360},100%,70%)`;
  ctx.lineWidth   = 0.7;
  for(let i = 0; i < N_LINES; i++){
    const a     = (i / N_LINES) * TWO_PI + rot1 * 0.35;
    const alpha = 0.12 + e * 0.28;
    ctx.strokeStyle = `hsla(${(hueShift + i*18)%360},100%,70%,${alpha.toFixed(2)})`;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * S * 0.03, cy + Math.sin(a) * S * 0.03);
    ctx.lineTo(cx + Math.cos(a) * S * (0.18 + e * 0.28), cy + Math.sin(a) * S * (0.18 + e * 0.28));
    ctx.stroke();
  }
  ctx.restore();

  // Scan rings — disparam no kick
  for(const s of scans){
    ctx.save();
    ctx.shadowBlur  = 20 + e * 25;
    ctx.shadowColor = `hsl(${(hueShift+200)%360},100%,70%)`;
    ctx.strokeStyle = `hsla(${(hueShift+200)%360},100%,80%,${s.a.toFixed(2)})`;
    ctx.lineWidth   = 1.5;
    ctx.beginPath(); ctx.arc(cx, cy, s.r * S, 0, TWO_PI); ctx.stroke();
    ctx.restore();
  }
}

// ─────────────────────────────────────────────────────────
//  ÁUDIO — parâmetros validados, não alterar
// ─────────────────────────────────────────────────────────
let audioCtx, analyser, sourceNode, audioBuffer;
const FFT = 512;
let freqData = null;

function setupAnalyser(){
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = FFT;
  analyser.smoothingTimeConstant = 0.0;
  analyser.minDecibels = -90;
  analyser.maxDecibels = -10;
  freqData = new Uint8Array(analyser.frequencyBinCount);
  analyser.connect(audioCtx.destination);
}

async function loadURL(url){
  try{
    const r = await fetch(url); if(!r.ok) throw 0;
    audioBuffer = await audioCtx.decodeAudioData(await r.arrayBuffer());
    startPlayback(); return true;
  } catch { return false; }
}
async function loadFile(file){
  try{
    audioBuffer = await audioCtx.decodeAudioData(await file.arrayBuffer());
    startPlayback();
  } catch {}
}
function startPlayback(){
  if(sourceNode){ sourceNode.disconnect(); sourceNode = null; }
  sourceNode = audioCtx.createBufferSource();
  sourceNode.buffer = audioBuffer; sourceNode.loop = true;
  sourceNode.connect(analyser); sourceNode.start(0);
  bTimes.length = 0; bpm = 0; bassI0 = -1; bassI1 = -1;
  isPlaying = true;
}

function bandRMS(lo, hi){
  if(!analyser || !freqData) return 0;
  const bin = audioCtx.sampleRate / FFT;
  const i0  = Math.max(0, Math.floor(lo / bin));
  const i1  = Math.min(freqData.length - 1, Math.floor(hi / bin));
  if(i1 < i0) return 0;
  let s = 0;
  for(let i = i0; i <= i1; i++){ const v = freqData[i] / 255; s += v * v; }
  return Math.sqrt(s / (i1 - i0 + 1));
}

// Spectral Flux — parâmetros validados
const FLUX_HIST = 43;
const fluxHistory = new Float32Array(FLUX_HIST);
let fluxPtr=0, fluxSmooth=0, fluxPeak=0, prevFFT=null;
const BEAT_SENS=2.0, COOL_FRAMES=14;
let beatCool=0, bpm=0;
const bTimes=[];
let bassI0=-1, bassI1=-1;
let kickFired=false, kickMag=0, currentRawBass=0, currentRawMid=0;

function processAudio(){
  if(!analyser || !freqData) return;
  analyser.getByteFrequencyData(freqData);

  if(bassI0 < 0){
    const bin = audioCtx.sampleRate / FFT;
    bassI0 = Math.max(0, Math.floor(20  / bin));
    bassI1 = Math.min(freqData.length - 1, Math.floor(140 / bin));
  }

  const rawBass = bandRMS(20,  140);
  const rawMid  = bandRMS(500, 6000);
  currentRawBass = rawBass;
  currentRawMid  = rawMid;

  let flux = 0;
  if(prevFFT !== null){
    for(let i = bassI0; i <= bassI1; i++){
      const diff = (freqData[i] / 255) - prevFFT[i];
      if(diff > 0) flux += diff;
    }
  }
  if(prevFFT === null) prevFFT = new Float32Array(freqData.length);
  for(let i = 0; i < freqData.length; i++) prevFFT[i] = freqData[i] / 255;

  fluxSmooth = 0.3 * flux + 0.7 * fluxSmooth;
  flux       = fluxSmooth;
  fluxPeak   = Math.max(fluxPeak * 0.98, flux);
  fluxHistory[fluxPtr % FLUX_HIST] = flux;
  fluxPtr++;

  let avg = 0;
  for(let i = 0; i < FLUX_HIST; i++) avg += fluxHistory[i];
  avg /= FLUX_HIST;

  let variance = 0;
  for(let i = 0; i < FLUX_HIST; i++){ const d = fluxHistory[i] - avg; variance += d * d; }
  variance /= FLUX_HIST;

  const threshold = Math.max(avg + variance * BEAT_SENS, avg * 1.8);
  const bN        = rawBass / Math.max(rawBass * 0.1, 0.01);

  kickFired = false;
  if(beatCool > 0){ beatCool--; }
  else if(flux > threshold && bN > 0.20 && flux >= fluxPeak * 0.95){
    kickFired = true;
    kickMag   = Math.min(rawBass * 3.0, 1.0);
    beatCool  = COOL_FRAMES;

    const now = performance.now();
    bTimes.push(now);
    if(bTimes.length > 8) bTimes.shift();
    if(bTimes.length >= 2){
      const diffs = [];
      for(let i = 1; i < bTimes.length; i++) diffs.push(bTimes[i] - bTimes[i-1]);
      const avgD = diffs.reduce((a, b) => a + b, 0) / diffs.length;
      if(avgD > 0) bpm = Math.round(60000 / avgD);
    }
  }
}

// ─────────────────────────────────────────────────────────
//  RENDER LOOP
// ─────────────────────────────────────────────────────────
let isPlaying = false;

function render(){
  requestAnimationFrame(render);
  if(isPlaying){
    processAudio();
    if(kickFired) applyKickImpulse(kickMag);
  }
  stepPhysics(currentRawBass, currentRawMid);
  draw();
}
requestAnimationFrame(render);

// ─────────────────────────────────────────────────────────
//  UI
// ─────────────────────────────────────────────────────────
const ui = document.getElementById('ui');
function hideUI(){
  ui.classList.add('hidden');
  setTimeout(() => ui.style.display = 'none', 450);
}

document.getElementById('startBtn').addEventListener('click', async () => {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  setupAnalyser();
  const ok = await loadURL('assets/audio/demo.mp3');
  if(!ok){
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.frequency.value = 80; g.gain.value = 0.04;
    osc.connect(g); g.connect(analyser); osc.start();
    isPlaying = true;
  }
  hideUI();
});

document.getElementById('drop').addEventListener('click',
  () => document.getElementById('fi').click());

document.getElementById('fi').addEventListener('change', async e => {
  const f = e.target.files[0]; if(!f) return;
  if(!audioCtx){ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); setupAnalyser(); }
  await loadFile(f); hideUI();
});

document.getElementById('drop').addEventListener('dragover', e => e.preventDefault());
document.getElementById('drop').addEventListener('drop', async e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0]; if(!f || !f.type.startsWith('audio/')) return;
  if(!audioCtx){ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); setupAnalyser(); }
  await loadFile(f); hideUI();
});
</script>
</body>
</html>
