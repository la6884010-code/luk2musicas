<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Kick Visual Test</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Space Mono',monospace;}
  canvas{display:block;width:100%;height:100%;position:absolute;top:0;left:0;}
  #ui{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;transition:opacity .4s;}
  #ui.hidden{opacity:0;pointer-events:none;}
  #ui h2{color:rgba(255,255,255,.5);font-size:13px;letter-spacing:3px;margin-bottom:32px;}
  .btn{padding:12px 36px;border:1px solid rgba(255,255,255,.25);border-radius:4px;
    background:transparent;color:#fff;font-family:'Space Mono',monospace;
    font-size:12px;letter-spacing:2px;cursor:pointer;margin:6px;}
  .btn:hover{background:rgba(255,255,255,.07);}
  .drop{margin-top:16px;padding:10px 24px;border:1px dashed rgba(255,255,255,.15);
    border-radius:4px;color:rgba(255,255,255,.35);font-size:11px;letter-spacing:1px;
    cursor:pointer;text-align:center;}
  #fi{display:none;}
  #label{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
    font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.18);pointer-events:none;white-space:nowrap;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label">KICK VISUAL TEST</div>

<div id="ui">
  <h2>KICK VISUAL TEST</h2>
  <button class="btn" id="startBtn">▶ DEMO.MP3</button>
  <div class="drop" id="drop">
    arraste seu áudio aqui
    <input type="file" id="fi" accept="audio/*">
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────
//  CANVAS
// ─────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
function resize(){ canvas.width = innerWidth; canvas.height = innerHeight; }
resize(); window.addEventListener('resize', resize);

// ─────────────────────────────────────────────────────────
//  MOTION STATE — apenas duas variáveis
//
//  pulseVel: velocidade — recebe impulso no kick
//  pulsePos: posição    — integra velocidade, alimenta render
// ─────────────────────────────────────────────────────────
let pulseVel = 0;
let pulsePos = 0;

function applyKickImpulse(mag){
  pulseVel += mag * 4.0;   // impulso proporcional à magnitude do kick
}

function stepPhysics(){
  pulsePos += pulseVel;    // integra velocidade → posição
  pulseVel *= 0.65;        // decai rápido: ~5-6 frames até zero
  pulsePos *= 0.80;        // evita acúmulo indefinido
}

// ─────────────────────────────────────────────────────────
//  RENDER — três efeitos, todos lidos de pulsePos
// ─────────────────────────────────────────────────────────
const TWO_PI  = Math.PI * 2;
const N_WARP  = 180;        // pontos do polígono de warp

function draw(){
  const W  = canvas.width;
  const H  = canvas.height;
  const cx = W / 2;
  const cy = H / 2;
  const p  = pulsePos;      // única variável visual

  // 1. Fundo preto
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  if(p < 0.001) return;    // nada a desenhar

  const alpha = Math.min(p, 1);

  // 2. FLASH — retângulo branco sobre tudo
  //    Some junto com o pulso — impacto imediato, desaparece rápido
  ctx.fillStyle = `rgba(255,255,255,${(alpha * 0.55).toFixed(3)})`;
  ctx.fillRect(0, 0, W, H);

  // 3. EXPANSÃO RADIAL — círculo crescendo a partir do centro
  //    Raio base + extensão proporcional ao pulso
  const baseR  = Math.min(W, H) * 0.06;
  const radius = baseR + p * Math.min(W, H) * 0.38;
  const strokeA = Math.min(alpha * 1.2, 1);

  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, TWO_PI);
  ctx.strokeStyle = `rgba(255,255,255,${strokeA.toFixed(3)})`;
  ctx.lineWidth   = 2 + p * 6;
  ctx.stroke();

  // 4. WARP — borda do círculo distorcida senoidalmente
  //    Amplitude da distorção proporcional ao pulso
  //    Dá a sensação de "impacto físico" na borda
  const warpAmp = p * 28;   // amplitude máxima em px
  const warpFreq = 5;        // quantos picos na volta

  ctx.beginPath();
  for(let i = 0; i <= N_WARP; i++){
    const ang  = (i / N_WARP) * TWO_PI;
    const r    = radius + Math.sin(ang * warpFreq) * warpAmp;
    const x    = cx + Math.cos(ang) * r;
    const y    = cy + Math.sin(ang) * r;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.strokeStyle = `rgba(255,255,255,${(alpha * 0.35).toFixed(3)})`;
  ctx.lineWidth   = 1;
  ctx.stroke();
}

// ─────────────────────────────────────────────────────────
//  ÁUDIO — pipeline idêntica ao demo_lab validado
//  Sem alterações na lógica de detecção
// ─────────────────────────────────────────────────────────
let audioCtx, analyser, sourceNode, audioBuffer;
const FFT = 512;
let freqData = null;

function setupAnalyser(){
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = FFT;
  analyser.smoothingTimeConstant = 0.0;
  analyser.minDecibels = -90;
  analyser.maxDecibels = -10;
  freqData = new Uint8Array(analyser.frequencyBinCount);
  analyser.connect(audioCtx.destination);
}

async function loadURL(url){
  try{
    const r = await fetch(url); if(!r.ok) throw 0;
    audioBuffer = await audioCtx.decodeAudioData(await r.arrayBuffer());
    startPlayback(); return true;
  } catch { return false; }
}
async function loadFile(file){
  try{
    audioBuffer = await audioCtx.decodeAudioData(await file.arrayBuffer());
    startPlayback();
  } catch {}
}
function startPlayback(){
  if(sourceNode){ sourceNode.disconnect(); sourceNode = null; }
  sourceNode = audioCtx.createBufferSource();
  sourceNode.buffer = audioBuffer; sourceNode.loop = true;
  sourceNode.connect(analyser); sourceNode.start(0);
  bTimes.length = 0; bpm = 0; bassI0 = -1; bassI1 = -1;
  isPlaying = true;
}

function bandRMS(lo, hi){
  if(!analyser || !freqData) return 0;
  const bin = audioCtx.sampleRate / FFT;
  const i0  = Math.max(0, Math.floor(lo / bin));
  const i1  = Math.min(freqData.length - 1, Math.floor(hi / bin));
  if(i1 < i0) return 0;
  let s = 0;
  for(let i = i0; i <= i1; i++){ const v = freqData[i] / 255; s += v * v; }
  return Math.sqrt(s / (i1 - i0 + 1));
}

// Spectral Flux — kick detection (idêntico ao validado)
const FLUX_HIST  = 43;
const fluxHistory = new Float32Array(FLUX_HIST);
let fluxPtr=0, fluxSmooth=0, fluxPeak=0, prevFFT=null;
const BEAT_SENS=1.1, COOL_FRAMES=8;
let beatCool=0, bpm=0;
const bTimes=[];
let bassI0=-1, bassI1=-1;
let kickFired=false, kickMag=0;

function processAudio(){
  if(!analyser || !freqData) return;
  analyser.getByteFrequencyData(freqData);

  if(bassI0 < 0){
    const bin = audioCtx.sampleRate / FFT;
    bassI0 = Math.max(0, Math.floor(20  / bin));
    bassI1 = Math.min(freqData.length - 1, Math.floor(140 / bin));
  }

  const rawBass = bandRMS(20, 140);

  let flux = 0;
  if(prevFFT !== null){
    for(let i = bassI0; i <= bassI1; i++){
      const diff = (freqData[i] / 255) - prevFFT[i];
      if(diff > 0) flux += diff;
    }
  }
  if(prevFFT === null) prevFFT = new Float32Array(freqData.length);
  for(let i = 0; i < freqData.length; i++) prevFFT[i] = freqData[i] / 255;

  fluxSmooth = 0.3 * flux + 0.7 * fluxSmooth;
  flux       = fluxSmooth;
  fluxPeak   = Math.max(fluxPeak * 0.98, flux);
  fluxHistory[fluxPtr % FLUX_HIST] = flux;
  fluxPtr++;

  let avg = 0;
  for(let i = 0; i < FLUX_HIST; i++) avg += fluxHistory[i];
  avg /= FLUX_HIST;

  let variance = 0;
  for(let i = 0; i < FLUX_HIST; i++){ const d = fluxHistory[i] - avg; variance += d * d; }
  variance /= FLUX_HIST;

  const threshold = Math.max(avg + variance * BEAT_SENS, avg * 1.2);
  const bN        = rawBass / Math.max(rawBass * 0.1, 0.01);

  kickFired = false;
  if(beatCool > 0){ beatCool--; }
  else if(flux > threshold && bN > 0.08 && flux >= fluxPeak * 0.95){
    kickFired = true;
    kickMag   = Math.min(rawBass * 3.0, 1.0);
    beatCool  = COOL_FRAMES;

    const now = performance.now();
    bTimes.push(now);
    if(bTimes.length > 8) bTimes.shift();
    if(bTimes.length >= 2){
      const diffs = [];
      for(let i = 1; i < bTimes.length; i++) diffs.push(bTimes[i] - bTimes[i-1]);
      const avgD = diffs.reduce((a, b) => a + b, 0) / diffs.length;
      if(avgD > 0) bpm = Math.round(60000 / avgD);
    }
  }
}

// ─────────────────────────────────────────────────────────
//  RENDER LOOP
// ─────────────────────────────────────────────────────────
let isPlaying = false;

function render(){
  requestAnimationFrame(render);

  if(isPlaying){
    processAudio();
    if(kickFired) applyKickImpulse(kickMag);
  }

  stepPhysics();   // roda sempre — garante decaimento suave
  draw();
}
requestAnimationFrame(render);

// ─────────────────────────────────────────────────────────
//  UI
// ─────────────────────────────────────────────────────────
const ui = document.getElementById('ui');

function hideUI(){
  ui.classList.add('hidden');
  setTimeout(() => ui.style.display = 'none', 450);
}

document.getElementById('startBtn').addEventListener('click', async () => {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  setupAnalyser();
  const ok = await loadURL('assets/audio/demo.mp3');
  if(!ok){
    // fallback: oscilador de bass para testar física sem arquivo
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.frequency.value = 80; g.gain.value = 0.04;
    osc.connect(g); g.connect(analyser); osc.start();
    isPlaying = true;
  }
  hideUI();
});

document.getElementById('drop').addEventListener('click',
  () => document.getElementById('fi').click());

document.getElementById('fi').addEventListener('change', async e => {
  const f = e.target.files[0]; if(!f) return;
  if(!audioCtx){ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); setupAnalyser(); }
  await loadFile(f); hideUI();
});

document.getElementById('drop').addEventListener('dragover', e => e.preventDefault());
document.getElementById('drop').addEventListener('drop', async e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0]; if(!f || !f.type.startsWith('audio/')) return;
  if(!audioCtx){ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); setupAnalyser(); }
  await loadFile(f); hideUI();
});
</script>
</body>
</html>
